server:
  port: 8080

spring:
  application:
    name: online-ordering-backend
  # 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/online_ordering
    username: root
    password: 123456

# MyBatis 配置
mybatis:
  # mapper 配置文件
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.ruomeng.onlineorderingbackend.model.entity
  configuration:
    # 开启驼峰命名
    map-underscore-to-camel-case: true

# knife4j 配置 
knife4j:
  enable: true
  openapi:
    title: 在线点餐系统 API 文档
    description: 在线点餐系统后端接口文档
    version: 1.0
    group:
      default:
        api-rule: package
        api-rule-resources:
          - com.ruomeng.onlineorderingbackend.controller

# JWT 配置
jwt:
  # 密钥（至少 32 个字符，256 位）
  secret: ruomeng-online-ordering-backend-jwt
  # 过期时间（单位：秒，默认 2 小时）
  expiration: 7200

# 微信小程序配置
wechat:
  miniapp:
    # 小程序 AppID（请替换为你的小程序 AppID）
    appid: wx66e9d5ffac6de241
    # 小程序 AppSecret（请替换为你的小程序 AppSecret）
    secret: fd27a20710a06dace4d4346eaa14847f
    # 小程序码保存路径（保存到项目外部目录，持久化存储）
    qrcode-path: D:/upload/qrcode/
    # 小程序页面路径（扫码后跳转的页面，暂时使用首页）
    page-path: pages/index/index

# 日志配置
logging:
  level:
    com.ruomeng.onlineorderingbackend.mapper: debug
    com.ruomeng.onlineorderingbackend.service: info
    com.ruomeng.onlineorderingbackend.controller: info
